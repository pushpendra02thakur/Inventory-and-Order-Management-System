name: TraceHub CI-CD Pipeline

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  # ── Job 1: Lint & Validate ─────────────────────────────────────────────────
  lint-and-validate:
    name: Lint & Syntax Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Python Linters
        run: |
          python -m pip install --upgrade pip
          pip install flake8

      - name: Run Backend Syntax Checks
        run: |
          flake8 backend/app --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Setup Node 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install & Build Frontend
        working-directory: frontend
        run: |
          npm install
          npm run build

  # ── Job 2: Build Docker Images ─────────────────────────────────────────────
  build-docker-images:
    name: Build Docker Images
    needs: lint-and-validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Backend Docker Image
        run: |
          docker build ./backend --file ./backend/Dockerfile --tag tracehub-backend:latest

      - name: Build Frontend Docker Image
        run: |
          docker build ./frontend --file ./frontend/Dockerfile --tag tracehub-frontend:latest
