name: TraceHub CI-CD Pipeline

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  lint-and-validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-python-version: '3.10'

      - name: Install Python Linters
        run: |
          python -m pip install --upgrade pip
          pip install flake8

      - name: Run Backend Syntax Checks
        run: |
          # stop the build if there are Python syntax errors or undefined names
          flake8 backend/app --count --select=E9,F63,F7,F82 --show-source --statistics

  build-docker-images:
    needs: lint-and-validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Docker Buildx
        uses: orgs/setup-buildx-action@v2
        # Note: We use standard setup action, or fallback if using third-party actions
        # Using actions/checkout and standard docker commands ensures no custom action dependencies break.

      - name: Build Backend Docker Image
        run: |
          docker build ./backend --file ./backend/Dockerfile --tag tracehub-backend:latest

      - name: Build Frontend Docker Image
        run: |
          docker build ./frontend --file ./frontend/Dockerfile --tag tracehub-frontend:latest
